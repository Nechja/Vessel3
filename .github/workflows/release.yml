name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            ext: ''
            apt: clang zlib1g-dev
          - rid: linux-arm64
            runner: ubuntu-24.04-arm
            ext: ''
            apt: clang zlib1g-dev
          - rid: linux-musl-x64
            runner: ubuntu-latest
            ext: ''
            apt: clang zlib1g-dev musl-tools
          - rid: osx-arm64
            runner: macos-latest
            ext: ''
          - rid: osx-x64
            runner: macos-13
            ext: ''
          - rid: win-x64
            runner: windows-latest
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install apt deps
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ${{ matrix.apt }}

      - name: Publish
        shell: bash
        run: |
          dotnet publish Vessel3.Server \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained \
            -o publish/${{ matrix.rid }} \
            --nologo

      - name: Package
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          name=vessel3-${{ github.ref_name }}-${{ matrix.rid }}
          if [ "${{ matrix.ext }}" = ".exe" ]; then
            7z a "../../$name.zip" "vessel3${{ matrix.ext }}"
          else
            tar -czf "../../$name.tar.gz" "vessel3${{ matrix.ext }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: vessel3-${{ matrix.rid }}
          path: |
            vessel3-*.tar.gz
            vessel3-*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute checksums
        run: |
          cd dist
          sha256sum vessel3-* > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vessel3-*
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
