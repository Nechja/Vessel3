name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.rid }}${{ matrix.embed_ui == 'true' && '-ui' || '' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        rid: [linux-x64, linux-arm64, osx-arm64, win-x64]
        embed_ui: ['false', 'true']
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            apt: clang zlib1g-dev
          - rid: linux-arm64
            runner: ubuntu-24.04-arm
            apt: clang zlib1g-dev
          - rid: osx-arm64
            runner: macos-latest
          - rid: win-x64
            runner: windows-latest
            windows: true

    env:
      VARIANT: ${{ matrix.embed_ui == 'true' && '-ui' || '' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install apt deps
        if: matrix.apt
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ${{ matrix.apt }}

      - name: Publish
        shell: bash
        run: |
          dotnet publish Vessel3.Server \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained \
            -p:EmbedUi=${{ matrix.embed_ui }} \
            -o publish/${{ matrix.rid }} \
            --nologo

      - name: Package (unix)
        if: '!matrix.windows'
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          tar -czf "$GITHUB_WORKSPACE/vessel3-${{ github.ref_name }}-${{ matrix.rid }}$VARIANT.tar.gz" vessel3

      - name: Package (windows)
        if: matrix.windows
        shell: pwsh
        run: |
          $name = "vessel3-${{ github.ref_name }}-${{ matrix.rid }}$env:VARIANT.zip"
          Compress-Archive -Path "publish/${{ matrix.rid }}/vessel3.exe" -DestinationPath "$env:GITHUB_WORKSPACE/$name"

      - uses: actions/upload-artifact@v7
        with:
          name: vessel3-${{ matrix.rid }}${{ env.VARIANT }}
          path: |
            vessel3-*.tar.gz
            vessel3-*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ always() && !cancelled() && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Compute checksums
        shell: bash
        run: |
          cd dist
          ls -la
          sha256sum vessel3-* > SHA256SUMS

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/vessel3-*
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: false
