name: container

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository_owner }}/vessel3

jobs:
  build:
    name: ${{ matrix.embed_ui == 'true' && 'ui' || 'base' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        embed_ui: ['false', 'true']
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          flavor: |
            suffix=${{ matrix.embed_ui == 'true' && '-ui' || '' }},onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Vessel3.Server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            EMBED_UI=${{ matrix.embed_ui }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.embed_ui == 'true' && 'ui' || 'base' }}
          cache-to: type=gha,mode=max,scope=${{ matrix.embed_ui == 'true' && 'ui' || 'base' }}
